services:
  mysql:
    image: mysql:8.0
    container_name: chair_rental_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - rental_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ── Rocket.Chat ──────────────────────────────────────────────────────────────

  rocketchat_mongo:
    image: mongo:8.0
    container_name: chair_rental_rc_mongo
    restart: unless-stopped
    command: mongod --oplogSize 128 --replSet rs0
    volumes:
      - rocketchat_mongo_data:/data/db
    networks:
      - rental_network
    healthcheck:
      # Initialise the replica set on first run; subsequent runs check status.
      test: >
        test $$(mongosh --quiet --eval
        "try{rs.initiate({_id:'rs0',members:[{_id:0,host:'rocketchat_mongo:27017'}]}).ok}
        catch(e){rs.status().ok}") -eq 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  rocketchat:
    image: rocketchat/rocket.chat:latest
    container_name: chair_rental_rocketchat
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://rocketchat_mongo:27017/rocketchat?replicaSet=rs0
      MONGO_OPLOG_URL: mongodb://rocketchat_mongo:27017/local?replicaSet=rs0
      ROOT_URL: ${ROCKETCHAT_PUBLIC_URL}
      PORT: 3000
      DEPLOY_PLATFORM: docker
      # Auto-complete the setup wizard so RC starts ready to use
      OVERWRITE_SETTING_Show_Setup_Wizard: completed
      # Pre-create admin account from env vars
      ADMIN_EMAIL: ${ROCKETCHAT_ADMIN_EMAIL}
      ADMIN_PASS: ${ROCKETCHAT_ADMIN_PASSWORD}
      ADMIN_USERNAME: rcadmin
      ADMIN_NAME: RC Admin
      CREATE_TOKENS_FOR_USERS_SECRET: ${ROCKETCHAT_USER_SECRET}
      # Disable public registration — users are created via the admin API
      OVERWRITE_SETTING_Accounts_RegistrationForm: Disabled
      # Disable Rocket.Chat's frame restriction so the booking widget can embed it
      OVERWRITE_SETTING_Iframe_Restrict_Access: 'false'
      OVERWRITE_SETTING_Iframe_X_Frame_Options: ''
      # Enable Iframe Integration so the widget can send/receive postMessages
      OVERWRITE_SETTING_Iframe_Integration_send_enable: 'true'
      OVERWRITE_SETTING_Iframe_Integration_receive_enable: 'true'
    ports:
      - "4000:3000"
    networks:
      - rental_network
    depends_on:
      rocketchat_mongo:
        condition: service_healthy
    volumes:
      - rocketchat_data:/app/uploads

  # ── Application services ──────────────────────────────────────────────────

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: chair_rental_pma
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8080:80"
    networks:
      - rental_network
    depends_on:
      mysql:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: chair_rental_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_SYNC: ${DB_SYNC}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      STAFF_FRONTEND_URL: ${STAFF_FRONTEND_URL}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      PLATFORM_COMMISSION_RATE: ${PLATFORM_COMMISSION_RATE}
      PAYMONGO_ENABLED: ${PAYMONGO_ENABLED}
      PAYMONGO_SECRET_KEY: ${PAYMONGO_SECRET_KEY}
      PAYMONGO_API_BASE_URL: ${PAYMONGO_API_BASE_URL}
      PAYMONGO_PLATFORM_MERCHANT_ID: ${PAYMONGO_PLATFORM_MERCHANT_ID}
      PAYMONGO_DELIVERY_MERCHANT_ID: ${PAYMONGO_DELIVERY_MERCHANT_ID}
      PAYMONGO_VENDOR_ONBOARDING_ENABLED: ${PAYMONGO_VENDOR_ONBOARDING_ENABLED}
      PAYMONGO_VENDOR_ONBOARDING_REQUIRED: ${PAYMONGO_VENDOR_ONBOARDING_REQUIRED}
      PAYMONGO_VENDOR_ONBOARDING_URL: ${PAYMONGO_VENDOR_ONBOARDING_URL}
      PAYMONGO_PAYMENT_METHOD_TYPES: ${PAYMONGO_PAYMENT_METHOD_TYPES}
      PAYMONGO_SUCCESS_URL: ${PAYMONGO_SUCCESS_URL}
      PAYMONGO_CANCEL_URL: ${PAYMONGO_CANCEL_URL}
      PAYMONGO_SPLIT_FEE_BUFFER_BPS: ${PAYMONGO_SPLIT_FEE_BUFFER_BPS}
      UPLOAD_DIR: /app/uploads
      # Rocket.Chat integration
      ROCKETCHAT_URL: ${ROCKETCHAT_URL}
      ROCKETCHAT_PUBLIC_URL: ${ROCKETCHAT_PUBLIC_URL}
      ROCKETCHAT_ADMIN_EMAIL: ${ROCKETCHAT_ADMIN_EMAIL}
      ROCKETCHAT_ADMIN_PASSWORD: ${ROCKETCHAT_ADMIN_PASSWORD}
      ROCKETCHAT_WEBHOOK_SECRET: ${ROCKETCHAT_WEBHOOK_SECRET}
      ROCKETCHAT_USER_SECRET: ${ROCKETCHAT_USER_SECRET}
    volumes:
      - ./api/uploads:/app/uploads
    ports:
      - "3000:3000"
    networks:
      - rental_network
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        VITE_VENDOR_DOMAIN: ${VENDOR_DOMAIN}
        VITE_API_URL: ${VITE_API_URL}
        VITE_VENDOR_LOGIN_URL: ${VITE_VENDOR_LOGIN_URL}
    container_name: chair_rental_app
    restart: unless-stopped
    ports:
      - "43171:80"
    networks:
      - rental_network
    depends_on:
      - api

  staff_app:
    build:
      context: ./staff-app
      dockerfile: Dockerfile
      args:
        VITE_VENDOR_DOMAIN: ${VENDOR_DOMAIN}
        VITE_API_URL: ${VITE_API_URL}
    container_name: chair_rental_staff_app
    restart: unless-stopped
    ports:
      - "43172:80"
    networks:
      - rental_network
    depends_on:
      - api

  nginx_proxy:
    image: nginx:alpine
    container_name: chair_rental_proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    networks:
      - rental_network
    depends_on:
      - app
      - staff_app
      - api

  certbot:
    image: certbot/certbot
    container_name: chair_rental_certbot
    restart: unless-stopped
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    # Renew every 12 hours; Let's Encrypt certs renew when <30 days remain.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks:
      - rental_network

networks:
  rental_network:
    driver: bridge

volumes:
  mysql_data:
  rocketchat_mongo_data:
  rocketchat_data:
