# Use Docker's embedded DNS resolver so upstream hostnames are
# re-resolved after container restarts instead of being cached at startup.
resolver 127.0.0.11 valid=10s ipv6=off;

# ── HTTP ─────────────────────────────────────────────────────────────────────
# Serve ACME challenge files (Let's Encrypt renewal) from certbot.
# Redirect everything else to HTTPS.
server {
    listen 80;
    server_name rentalbasic.com
                www.rentalbasic.com
                api.rentalbasic.com
                vendors.rentalbasic.com
                ~^.*\.rentalbasic\.com$;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: API (api.rentalbasic.com) ─────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.rentalbasic.com;

    ssl_certificate     /etc/letsencrypt/live/rentalbasic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rentalbasic.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        set $upstream_api http://api:3000;
        proxy_pass         $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }
}

# ── HTTPS: Vendor / Admin app (vendors.rentalbasic.com) ──────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name vendors.rentalbasic.com
                vendor.rentalbasic.com;

    ssl_certificate     /etc/letsencrypt/live/rentalbasic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rentalbasic.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location ^~ /uploads/ {
        set $upstream_api http://api:3000;
        proxy_pass         $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        set $upstream_staff http://staff_app:80;
        proxy_pass         $upstream_staff;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── HTTPS: Customer app + all vendor shop subdomains ─────────────────────────
# Must come AFTER the specific subdomain blocks above.
server {
    listen 443 ssl;
    http2 on;
    server_name rentalbasic.com
                www.rentalbasic.com
                ~^(?!api\.|vendors\.|vendor\.).*\.rentalbasic\.com$;

    ssl_certificate     /etc/letsencrypt/live/rentalbasic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rentalbasic.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    location ^~ /uploads/ {
        set $upstream_api http://api:3000;
        proxy_pass         $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        set $upstream_app http://app:80;
        proxy_pass         $upstream_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
