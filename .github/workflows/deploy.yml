name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project:
          - app
          - staff-app
          - api

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage thresholds
        run: npm run test:coverage

  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'

    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Verify loaded SSH key
        run: ssh-add -l

      - name: Pull latest code on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_SHA: ${{ github.sha }}
          API_PORT: ${{ secrets.API_PORT }}
          DB_SYNC: ${{ secrets.DB_SYNC }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_EXPIRY: ${{ secrets.JWT_EXPIRY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          PAYMONGO_API_BASE_URL: ${{ secrets.PAYMONGO_API_BASE_URL }}
          PAYMONGO_CANCEL_URL: ${{ secrets.PAYMONGO_CANCEL_URL }}
          PAYMONGO_DELIVERY_MERCHANT_ID: ${{ secrets.PAYMONGO_DELIVERY_MERCHANT_ID }}
          PAYMONGO_ENABLED: ${{ secrets.PAYMONGO_ENABLED }}
          PAYMONGO_PAYMENT_METHOD_TYPES: ${{ secrets.PAYMONGO_PAYMENT_METHOD_TYPES }}
          PAYMONGO_PLATFORM_MERCHANT_ID: ${{ secrets.PAYMONGO_PLATFORM_MERCHANT_ID }}
          PAYMONGO_SECRET_KEY: ${{ secrets.PAYMONGO_SECRET_KEY }}
          PAYMONGO_SPLIT_FEE_BUFFER_BPS: ${{ secrets.PAYMONGO_SPLIT_FEE_BUFFER_BPS }}
          PAYMONGO_SUCCESS_URL: ${{ secrets.PAYMONGO_SUCCESS_URL }}
          PAYMONGO_VENDOR_ONBOARDING_ENABLED: ${{ secrets.PAYMONGO_VENDOR_ONBOARDING_ENABLED }}
          PAYMONGO_VENDOR_ONBOARDING_REQUIRED: ${{ secrets.PAYMONGO_VENDOR_ONBOARDING_REQUIRED }}
          PAYMONGO_VENDOR_ONBOARDING_URL: ${{ secrets.PAYMONGO_VENDOR_ONBOARDING_URL }}
          PLATFORM_COMMISSION_RATE: ${{ secrets.PLATFORM_COMMISSION_RATE }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          ROCKETCHAT_ADMIN_EMAIL: ${{ secrets.ROCKETCHAT_ADMIN_EMAIL }}
          ROCKETCHAT_ADMIN_PASSWORD: ${{ secrets.ROCKETCHAT_ADMIN_PASSWORD }}
          ROCKETCHAT_PUBLIC_URL: ${{ secrets.ROCKETCHAT_PUBLIC_URL }}
          ROCKETCHAT_URL: ${{ secrets.ROCKETCHAT_URL }}
          ROCKETCHAT_USER_SECRET: ${{ secrets.ROCKETCHAT_USER_SECRET }}
          ROCKETCHAT_WEBHOOK_SECRET: ${{ secrets.ROCKETCHAT_WEBHOOK_SECRET }}
          STAFF_FRONTEND_URL: ${{ secrets.STAFF_FRONTEND_URL }}
          VENDOR_DOMAIN: ${{ secrets.VENDOR_DOMAIN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_VENDOR_LOGIN_URL: ${{ secrets.VITE_VENDOR_LOGIN_URL }}
          TLS_AUTO_PROVISION: ${{ secrets.TLS_AUTO_PROVISION }}
          CERTBOT_DOMAIN: ${{ secrets.CERTBOT_DOMAIN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_ZONE: ${{ secrets.HOSTINGER_ZONE }}
          HOSTINGER_DNS_TTL: ${{ secrets.HOSTINGER_DNS_TTL }}
          HOSTINGER_DNS_PROPAGATION_SECONDS: ${{ secrets.HOSTINGER_DNS_PROPAGATION_SECONDS }}
          HOSTINGER_API_BASE_URL: ${{ secrets.HOSTINGER_API_BASE_URL }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=90 -o ConnectionAttempts=5 -o ServerAliveInterval=15 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes"

          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" "bash -s" <<REMOTE
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0
          if [ ! -d /root/chair-rental/.git ]; then
            git clone --branch ${DEPLOY_BRANCH} https://github.com/kmavillanosa/chair-rental.git /root/chair-rental
          fi
          cd /root/chair-rental

          cat > .env <<'ENVVARS'
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=${MYSQL_DATABASE}
          MYSQL_USER=${MYSQL_USER}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRY=${JWT_EXPIRY}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
          FRONTEND_URL=${FRONTEND_URL}
          STAFF_FRONTEND_URL=${STAFF_FRONTEND_URL}
          VITE_API_URL=${VITE_API_URL}
          VITE_VENDOR_LOGIN_URL=${VITE_VENDOR_LOGIN_URL}
          VENDOR_DOMAIN=${VENDOR_DOMAIN}
          API_PORT=${API_PORT}
          PROXY_PORT=${PROXY_PORT}
          DB_SYNC=${DB_SYNC}
          PLATFORM_COMMISSION_RATE=${PLATFORM_COMMISSION_RATE}
          PAYMONGO_ENABLED=${PAYMONGO_ENABLED}
          PAYMONGO_SECRET_KEY=${PAYMONGO_SECRET_KEY}
          PAYMONGO_API_BASE_URL=${PAYMONGO_API_BASE_URL}
          PAYMONGO_PLATFORM_MERCHANT_ID=${PAYMONGO_PLATFORM_MERCHANT_ID}
          PAYMONGO_DELIVERY_MERCHANT_ID=${PAYMONGO_DELIVERY_MERCHANT_ID}
          PAYMONGO_VENDOR_ONBOARDING_ENABLED=${PAYMONGO_VENDOR_ONBOARDING_ENABLED}
          PAYMONGO_VENDOR_ONBOARDING_REQUIRED=${PAYMONGO_VENDOR_ONBOARDING_REQUIRED}
          PAYMONGO_VENDOR_ONBOARDING_URL=${PAYMONGO_VENDOR_ONBOARDING_URL}
          PAYMONGO_PAYMENT_METHOD_TYPES=${PAYMONGO_PAYMENT_METHOD_TYPES}
          PAYMONGO_SUCCESS_URL=${PAYMONGO_SUCCESS_URL}
          PAYMONGO_CANCEL_URL=${PAYMONGO_CANCEL_URL}
          PAYMONGO_SPLIT_FEE_BUFFER_BPS=${PAYMONGO_SPLIT_FEE_BUFFER_BPS}
          GMAIL_USER=${GMAIL_USER}
          GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
          ROCKETCHAT_URL=${ROCKETCHAT_URL}
          ROCKETCHAT_PUBLIC_URL=${ROCKETCHAT_PUBLIC_URL}
          ROCKETCHAT_ADMIN_EMAIL=${ROCKETCHAT_ADMIN_EMAIL}
          ROCKETCHAT_ADMIN_PASSWORD=${ROCKETCHAT_ADMIN_PASSWORD}
          ROCKETCHAT_USER_SECRET=${ROCKETCHAT_USER_SECRET}
          ROCKETCHAT_WEBHOOK_SECRET=${ROCKETCHAT_WEBHOOK_SECRET}
          TLS_AUTO_PROVISION=${TLS_AUTO_PROVISION}
          CERTBOT_DOMAIN=${CERTBOT_DOMAIN}
          CERTBOT_EMAIL=${CERTBOT_EMAIL}
          HOSTINGER_API_TOKEN=${HOSTINGER_API_TOKEN}
          HOSTINGER_ZONE=${HOSTINGER_ZONE}
          HOSTINGER_DNS_TTL=${HOSTINGER_DNS_TTL}
          HOSTINGER_DNS_PROPAGATION_SECONDS=${HOSTINGER_DNS_PROPAGATION_SECONDS}
          HOSTINGER_API_BASE_URL=${HOSTINGER_API_BASE_URL}
          ENVVARS

          chmod 600 .env

          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "ERROR: VPS repo has local tracked changes. Clean /root/chair-rental before deploying." >&2
            git status --short >&2
            exit 1
          fi

          git fetch --prune origin ${DEPLOY_BRANCH}

          if git show-ref --verify --quiet "refs/heads/${DEPLOY_BRANCH}"; then
            git checkout ${DEPLOY_BRANCH}
          else
            git checkout -b ${DEPLOY_BRANCH} --track origin/${DEPLOY_BRANCH}
          fi

          git merge --ff-only origin/${DEPLOY_BRANCH}

          CURRENT_SHA=$(git rev-parse HEAD)
          echo "Synced /root/chair-rental to ${CURRENT_SHA} on branch ${DEPLOY_BRANCH}"

          if [ -n "${DEPLOY_SHA:-}" ] && [ "$CURRENT_SHA" != "${DEPLOY_SHA}" ]; then
            echo "ERROR: Expected commit ${DEPLOY_SHA} but VPS is at ${CURRENT_SHA}." >&2
            exit 1
          fi
          REMOTE

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [test, sync]
    if: github.event_name == 'push'

    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Verify loaded SSH key
        run: ssh-add -l

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=90 -o ConnectionAttempts=5 -o ServerAliveInterval=15 -o ServerAliveCountMax=60 -o TCPKeepAlive=yes"

          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" "bash -s" <<'REMOTE'
          set -euo pipefail
          cd /root/chair-rental

          set -a
          . ./.env
          set +a

          if [ "${TLS_AUTO_PROVISION:-false}" = "true" ]; then
            DOMAIN_FOR_CERT="${CERTBOT_DOMAIN:-${HOSTINGER_ZONE:-rentalbasic.com}}"
            EMAIL_FOR_CERT="${CERTBOT_EMAIL:-}"

            if [ -z "$EMAIL_FOR_CERT" ]; then
              echo "TLS_AUTO_PROVISION=true but CERTBOT_EMAIL is empty." >&2
              exit 1
            fi

            DOMAIN="$DOMAIN_FOR_CERT" \
            EMAIL="$EMAIL_FOR_CERT" \
            DNS_PROVIDER=hostinger \
            FORCE_RENEWAL=false \
            bash nginx/certbot-init.sh
          fi

          docker compose up -d --build
          docker compose exec -T api npm run db:migrate
          docker compose exec -T api node dist/scripts/seed-catalog.js
          docker compose ps
          REMOTE
