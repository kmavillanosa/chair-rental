name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - app
          - staff-app
          - api

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage thresholds
        run: npm run test:coverage

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%b' "$VPS_SSH_KEY" > ~/.ssh/github_deploy
          sed -i 's/\r$//' ~/.ssh/github_deploy
          chmod 600 ~/.ssh/github_deploy

          if ! grep -q "BEGIN OPENSSH PRIVATE KEY" ~/.ssh/github_deploy; then
            echo "VPS_SSH_KEY is not a valid OpenSSH private key"
            exit 1
          fi

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ~/.ssh/github_deploy
          script: |
            set -e
            cd /root/chair-rental
            git pull origin main
            docker compose up -d --build
            docker compose ps
