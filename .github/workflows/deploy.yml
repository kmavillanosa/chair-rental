name: Upload artifact and deploy containers on VPS

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build_artifact:
    name: Build and upload artifact
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            app/package-lock.json
            staff-app/package-lock.json

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci --prefer-offline --no-audit --prefix api
          npm ci --prefer-offline --no-audit --prefix app
          npm ci --prefer-offline --no-audit --prefix staff-app

      - name: Build artifacts
        env:
          VITE_VENDOR_DOMAIN: ${{ secrets.VENDOR_DOMAIN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_VENDOR_LOGIN_URL: ${{ secrets.VITE_VENDOR_LOGIN_URL }}
          VITE_STAFF_APP_URL: ${{ secrets.VITE_STAFF_APP_URL }}
          VITE_CUSTOMER_APP_URL: ${{ secrets.VITE_CUSTOMER_APP_URL }}
        run: |
          set -euo pipefail

          for key in VITE_API_URL VITE_VENDOR_LOGIN_URL VITE_STAFF_APP_URL VITE_CUSTOMER_APP_URL; do
            value="${!key:-}"
            if [[ -n "$value" && "$value" =~ (localhost|127\.0\.0\.1|0\.0\.0\.0) ]]; then
              echo "Refusing to build production artifacts with local value: $key=$value"
              exit 1
            fi
          done

          npm run build --prefix api
          VITE_VENDOR_DOMAIN="${VITE_VENDOR_DOMAIN}" VITE_API_URL="${VITE_API_URL}" VITE_VENDOR_LOGIN_URL="${VITE_VENDOR_LOGIN_URL}" VITE_STAFF_APP_URL="${VITE_STAFF_APP_URL}" npm run build --prefix app
          VITE_VENDOR_DOMAIN="${VITE_VENDOR_DOMAIN}" VITE_API_URL="${VITE_API_URL}" VITE_CUSTOMER_APP_URL="${VITE_CUSTOMER_APP_URL}" npm run build --prefix staff-app

          BUILD_TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          printf '{"service":"app","commit":"%s","builtAt":"%s"}\n' "${GITHUB_SHA}" "${BUILD_TIMESTAMP}" > app/dist/version.json
          printf '{"service":"staff_app","commit":"%s","builtAt":"%s"}\n' "${GITHUB_SHA}" "${BUILD_TIMESTAMP}" > staff-app/dist/version.json

      - name: Create deploy bundle
        run: |
          set -euo pipefail
          tar -czf chair-rental-deploy-bundle.tgz \
            docker-compose.yml \
            docker-compose.release.yml \
            vps-refresh-ui.sh \
            nginx \
            api/package.json \
            api/package-lock.json \
            api/Dockerfile.release \
            api/dist \
            api/uploads \
            app/nginx.conf \
            app/Dockerfile.release \
            app/dist \
            staff-app/nginx.conf \
            staff-app/Dockerfile.release \
            staff-app/dist

      - name: Upload deploy bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle
          path: chair-rental-deploy-bundle.tgz
          retention-days: 7

  deploy_containers:
    name: Deploy containers on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [build_artifact]

    steps:
      - name: Download deploy bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle
          path: .

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_SHA: ${{ github.sha }}
          FORCE_NO_CACHE: ${{ secrets.FORCE_NO_CACHE }}
          UI_REFRESH_WITH_API: ${{ secrets.UI_REFRESH_WITH_API }}
          UI_REFRESH_PRUNE_IMAGES: ${{ secrets.UI_REFRESH_PRUNE_IMAGES }}

          API_PORT: ${{ secrets.API_PORT }}
          DB_SYNC: ${{ secrets.DB_SYNC }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          STAFF_FRONTEND_URL: ${{ secrets.STAFF_FRONTEND_URL }}
          VENDOR_DOMAIN: ${{ secrets.VENDOR_DOMAIN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_VENDOR_LOGIN_URL: ${{ secrets.VITE_VENDOR_LOGIN_URL }}
          VITE_STAFF_APP_URL: ${{ secrets.VITE_STAFF_APP_URL }}
          VITE_CUSTOMER_APP_URL: ${{ secrets.VITE_CUSTOMER_APP_URL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_EXPIRY: ${{ secrets.JWT_EXPIRY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          PAYMONGO_API_BASE_URL: ${{ secrets.PAYMONGO_API_BASE_URL }}
          PAYMONGO_CANCEL_URL: ${{ secrets.PAYMONGO_CANCEL_URL }}
          PAYMONGO_ENABLED: ${{ secrets.PAYMONGO_ENABLED }}
          PAYMONGO_PAYMENT_METHOD_TYPES: ${{ secrets.PAYMONGO_PAYMENT_METHOD_TYPES }}
          PAYMONGO_SECRET_KEY: ${{ secrets.PAYMONGO_SECRET_KEY }}
          PAYMONGO_SUCCESS_URL: ${{ secrets.PAYMONGO_SUCCESS_URL }}
          PLATFORM_COMMISSION_RATE: ${{ secrets.PLATFORM_COMMISSION_RATE }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          ROCKETCHAT_ADMIN_EMAIL: ${{ secrets.ROCKETCHAT_ADMIN_EMAIL }}
          ROCKETCHAT_ADMIN_PASSWORD: ${{ secrets.ROCKETCHAT_ADMIN_PASSWORD }}
          ROCKETCHAT_PUBLIC_URL: ${{ secrets.ROCKETCHAT_PUBLIC_URL }}
          ROCKETCHAT_URL: ${{ secrets.ROCKETCHAT_URL }}
          ROCKETCHAT_USER_SECRET: ${{ secrets.ROCKETCHAT_USER_SECRET }}
          ROCKETCHAT_WEBHOOK_SECRET: ${{ secrets.ROCKETCHAT_WEBHOOK_SECRET }}

          TLS_AUTO_PROVISION: ${{ secrets.TLS_AUTO_PROVISION }}
          CERTBOT_DOMAIN: ${{ secrets.CERTBOT_DOMAIN }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_ZONE: ${{ secrets.HOSTINGER_ZONE }}
          HOSTINGER_DNS_TTL: ${{ secrets.HOSTINGER_DNS_TTL }}
          HOSTINGER_DNS_PROPAGATION_SECONDS: ${{ secrets.HOSTINGER_DNS_PROPAGATION_SECONDS }}
          HOSTINGER_API_BASE_URL: ${{ secrets.HOSTINGER_API_BASE_URL }}
        run: |
          set -euo pipefail

          SSH_OPTS="-o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=90 -o ConnectionAttempts=5"

          cat > chair-rental.env <<ENVVARS
          MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
          MYSQL_DATABASE=${MYSQL_DATABASE}
          MYSQL_USER=${MYSQL_USER}
          MYSQL_PASSWORD=${MYSQL_PASSWORD}
          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRY=${JWT_EXPIRY}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
          FRONTEND_URL=${FRONTEND_URL}
          STAFF_FRONTEND_URL=${STAFF_FRONTEND_URL}
          VITE_API_URL=${VITE_API_URL}
          VITE_VENDOR_LOGIN_URL=${VITE_VENDOR_LOGIN_URL}
          VITE_STAFF_APP_URL=${VITE_STAFF_APP_URL}
          VITE_CUSTOMER_APP_URL=${VITE_CUSTOMER_APP_URL}
          VENDOR_DOMAIN=${VENDOR_DOMAIN}
          API_PORT=${API_PORT}
          PROXY_PORT=${PROXY_PORT}
          DB_SYNC=${DB_SYNC}
          PLATFORM_COMMISSION_RATE=${PLATFORM_COMMISSION_RATE}
          PAYMONGO_ENABLED=${PAYMONGO_ENABLED}
          PAYMONGO_SECRET_KEY=${PAYMONGO_SECRET_KEY}
          PAYMONGO_API_BASE_URL=${PAYMONGO_API_BASE_URL}
          PAYMONGO_PAYMENT_METHOD_TYPES=${PAYMONGO_PAYMENT_METHOD_TYPES}
          PAYMONGO_SUCCESS_URL=${PAYMONGO_SUCCESS_URL}
          PAYMONGO_CANCEL_URL=${PAYMONGO_CANCEL_URL}
          GMAIL_USER=${GMAIL_USER}
          GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
          ROCKETCHAT_URL=${ROCKETCHAT_URL}
          ROCKETCHAT_PUBLIC_URL=${ROCKETCHAT_PUBLIC_URL}
          ROCKETCHAT_ADMIN_EMAIL=${ROCKETCHAT_ADMIN_EMAIL}
          ROCKETCHAT_ADMIN_PASSWORD=${ROCKETCHAT_ADMIN_PASSWORD}
          ROCKETCHAT_USER_SECRET=${ROCKETCHAT_USER_SECRET}
          ROCKETCHAT_WEBHOOK_SECRET=${ROCKETCHAT_WEBHOOK_SECRET}
          TLS_AUTO_PROVISION=${TLS_AUTO_PROVISION}
          CERTBOT_DOMAIN=${CERTBOT_DOMAIN}
          CERTBOT_EMAIL=${CERTBOT_EMAIL}
          HOSTINGER_API_TOKEN=${HOSTINGER_API_TOKEN}
          HOSTINGER_ZONE=${HOSTINGER_ZONE}
          HOSTINGER_DNS_TTL=${HOSTINGER_DNS_TTL}
          HOSTINGER_DNS_PROPAGATION_SECONDS=${HOSTINGER_DNS_PROPAGATION_SECONDS}
          HOSTINGER_API_BASE_URL=${HOSTINGER_API_BASE_URL}
          ENVVARS

          scp $SSH_OPTS chair-rental-deploy-bundle.tgz "$VPS_USER@$VPS_HOST:/tmp/chair-rental-deploy-bundle.tgz"
          scp $SSH_OPTS chair-rental.env "$VPS_USER@$VPS_HOST:/tmp/chair-rental.env"

          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" "DEPLOY_SHA='$DEPLOY_SHA' FORCE_NO_CACHE='${FORCE_NO_CACHE:-false}' UI_REFRESH_WITH_API='${UI_REFRESH_WITH_API:-false}' UI_REFRESH_PRUNE_IMAGES='${UI_REFRESH_PRUNE_IMAGES:-false}' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p /root/chair-rental
          cd /root/chair-rental

          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1

          rm -rf api/dist app/dist staff-app/dist
          tar -xzf /tmp/chair-rental-deploy-bundle.tgz -C /root/chair-rental
          rm -f /tmp/chair-rental-deploy-bundle.tgz
          mkdir -p api/uploads
          chmod +x /root/chair-rental/vps-refresh-ui.sh

          mv /tmp/chair-rental.env .env
          rm -f /tmp/chair-rental.env

          chmod 600 .env

          set -a
          . ./.env
          set +a

          if [ "${TLS_AUTO_PROVISION:-false}" = "true" ]; then
            DOMAIN="${CERTBOT_DOMAIN:-${HOSTINGER_ZONE:-}}" \
            EMAIL="${CERTBOT_EMAIL:-}" \
            DNS_PROVIDER=hostinger \
            FORCE_RENEWAL=false \
            bash nginx/certbot-init.sh
          fi

          BUILD_FLAGS=(--pull)
          case "${FORCE_NO_CACHE:-false}" in
            true|TRUE|1|yes|YES|on|ON)
              BUILD_FLAGS+=(--no-cache)
              ;;
          esac

          docker compose -f docker-compose.yml -f docker-compose.release.yml build "${BUILD_FLAGS[@]}" api

          docker compose -f docker-compose.yml -f docker-compose.release.yml up -d --force-recreate mysql
          docker compose -f docker-compose.yml -f docker-compose.release.yml run --rm api npm run db:migrate
          docker compose -f docker-compose.yml -f docker-compose.release.yml up -d --force-recreate api phpmyadmin

          REFRESH_UI_ARGS=(--project-dir /root/chair-rental)
          case "${UI_REFRESH_WITH_API:-false}" in
            true|TRUE|1|yes|YES|on|ON)
              REFRESH_UI_ARGS+=(--with-api)
              ;;
          esac

          case "${UI_REFRESH_PRUNE_IMAGES:-false}" in
            true|TRUE|1|yes|YES|on|ON)
              REFRESH_UI_ARGS+=(--prune-images)
              ;;
          esac

          /root/chair-rental/vps-refresh-ui.sh "${REFRESH_UI_ARGS[@]}"

          # Force-create phpMyAdmin and fail hard if it is not running.
          docker compose -f docker-compose.yml -f docker-compose.release.yml up -d --force-recreate --no-deps phpmyadmin
          if ! docker compose -f docker-compose.yml -f docker-compose.release.yml ps --status running phpmyadmin | grep -q phpmyadmin; then
            echo "phpmyadmin was not running after first start attempt; forcing remove + recreate"
            docker compose -f docker-compose.yml -f docker-compose.release.yml rm -sf phpmyadmin || true
            docker compose -f docker-compose.yml -f docker-compose.release.yml up -d --force-recreate --no-deps phpmyadmin
          fi

          if ! docker compose -f docker-compose.yml -f docker-compose.release.yml ps --status running phpmyadmin | grep -q phpmyadmin; then
            echo "phpmyadmin is still not running after forced recreate"
            docker compose -f docker-compose.yml -f docker-compose.release.yml ps
            docker compose -f docker-compose.yml -f docker-compose.release.yml logs --tail=120 mysql phpmyadmin || true
            exit 1
          fi

          # Ensure core services are running before seeding all data.
          docker compose -f docker-compose.yml -f docker-compose.release.yml up -d mysql api app staff_app nginx_proxy phpmyadmin
          for svc in mysql api app staff_app nginx_proxy phpmyadmin; do
            if ! docker compose -f docker-compose.yml -f docker-compose.release.yml ps --status running "$svc" | grep -q "$svc"; then
              echo "service is not running: $svc"
              docker compose -f docker-compose.yml -f docker-compose.release.yml ps
              docker compose -f docker-compose.yml -f docker-compose.release.yml logs --tail=120 "$svc" || true
              exit 1
            fi
          done

          echo "Seeding all data after containers are running"
          docker compose -f docker-compose.yml -f docker-compose.release.yml exec -T api npm run seed:all

          APP_LOCAL_VERSION="$(docker compose -f docker-compose.yml -f docker-compose.release.yml exec -T app sh -lc 'cat /usr/share/nginx/html/version.json 2>/dev/null || true')"
          STAFF_LOCAL_VERSION="$(docker compose -f docker-compose.yml -f docker-compose.release.yml exec -T staff_app sh -lc 'cat /usr/share/nginx/html/version.json 2>/dev/null || true')"

          if [ -z "${APP_LOCAL_VERSION}" ]; then
            echo "app container is missing /usr/share/nginx/html/version.json"
            exit 1
          fi

          if [ -z "${STAFF_LOCAL_VERSION}" ]; then
            echo "staff_app container is missing /usr/share/nginx/html/version.json"
            exit 1
          fi

          echo "app local version: ${APP_LOCAL_VERSION}"
          echo "staff_app local version: ${STAFF_LOCAL_VERSION}"

          case "${APP_LOCAL_VERSION}" in
            *"\"commit\":\"${DEPLOY_SHA}\""*) ;;
            *)
              echo "app container commit does not match DEPLOY_SHA=${DEPLOY_SHA}"
              exit 1
              ;;
          esac

          case "${STAFF_LOCAL_VERSION}" in
            *"\"commit\":\"${DEPLOY_SHA}\""*) ;;
            *)
              echo "staff_app container commit does not match DEPLOY_SHA=${DEPLOY_SHA}"
              exit 1
              ;;
          esac

          APP_PUBLIC_BASE="${FRONTEND_URL%/}"
          STAFF_PUBLIC_BASE="${STAFF_FRONTEND_URL%/}"

          if [ -z "${APP_PUBLIC_BASE}" ] || [ -z "${STAFF_PUBLIC_BASE}" ]; then
            echo "FRONTEND_URL and STAFF_FRONTEND_URL must be set from secrets"
            exit 1
          fi

          APP_PUBLIC_VERSION="$(curl -fsS "${APP_PUBLIC_BASE}/version.json?sha=${DEPLOY_SHA}" || true)"
          STAFF_PUBLIC_VERSION="$(curl -fsS "${STAFF_PUBLIC_BASE}/version.json?sha=${DEPLOY_SHA}" || true)"

          echo "app public version: ${APP_PUBLIC_VERSION:-<empty>}"
          echo "staff_app public version: ${STAFF_PUBLIC_VERSION:-<empty>}"

          case "${APP_PUBLIC_VERSION}" in
            *"\"commit\":\"${DEPLOY_SHA}\""*) ;;
            *)
              echo "public app domain is not serving DEPLOY_SHA=${DEPLOY_SHA}"
              exit 1
              ;;
          esac

          case "${STAFF_PUBLIC_VERSION}" in
            *"\"commit\":\"${DEPLOY_SHA}\""*) ;;
            *)
              echo "public staff domain is not serving DEPLOY_SHA=${DEPLOY_SHA}"
              exit 1
              ;;
          esac

          echo "=== DEPLOYED SHA: ${DEPLOY_SHA} ==="
          docker compose -f docker-compose.yml -f docker-compose.release.yml ps
          REMOTE
